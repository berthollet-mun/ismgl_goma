name: ismgl
description: Gestion Inscription et Paiements - ISMGL
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  flutter_native_splash: ^2.3.8
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  fluttertoast: ^8.2.4
  pin_code_fields: ^8.0.1

  # Utils
  intl: ^0.20.2
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  permission_handler: ^11.3.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
